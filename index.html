<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Transcriber for IDI ສ້າງໂດຍ Sengdeuan Boutdavong</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans Lao', sans-serif;
            background-color: #f3f4f6;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Blur background when locked */
        .blur-overlay {
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col relative">

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/60 blur-overlay transition-opacity duration-300">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4 transform transition-transform duration-300 scale-100">
            <div class="text-center mb-6">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <h2 class="text-2xl font-bold text-gray-900">ເຂົ້າສູ່ລະບົບ (Login)</h2>
                <p class="text-sm text-gray-500 mt-2">ກະລຸນາປ້ອນລະຫັດຜ່ານເພື່ອເຂົ້າໃຊ້ງານ Audio Transcriber</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <input type="password" id="password-input" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-3 outline-none transition" placeholder="ປ້ອນລະຫັດຜ່ານ..." onkeypress="handleLoginKeyPress(event)">
                    <p id="login-error" class="text-red-500 text-xs mt-2 hidden">ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ, ກະລຸນາລອງໃໝ່!</p>
                </div>
                <button onclick="checkPassword()" class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-3 text-center transition">
                    ເຂົ້າສູ່ລະບົບ
                </button>
            </div>
        </div>
    </div>

    <!-- Main Content Wrapper (Hidden initially) -->
    <div id="main-app" class="flex-col min-h-screen opacity-0 pointer-events-none transition-opacity duration-500 hidden">
        <!-- Navbar -->
        <nav class="bg-white shadow-sm border-b border-gray-200">
                            <option value="english">ພາສາອັງກິດ (English)</option>
                        </select>
                    </div>

                    <!-- Mode Selection -->
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-2">ຮູບແບບການຖອດສຽງ (Transcription Mode)</label>
                        <select id="mode-select" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition">
                            <option value="general">ຖອດສຽງທົ່ວໄປ (Word-for-word + ແຍກ Q-R ສະເໝີ)</option>
                            <option value="idi_intelligent_verbatim">ຖອດສຽງແບບສະອາດ (ຕັດຄຳຂີ້ເຫຍື້ອ, False starts + ແຍກ Q-R)</option>
                            <option value="general_clean_original">ຖອດສຽງທົ່ວໄປ, ຕັດແຕ່ປະໂຍກທີ່ບໍ່ຄົບຖ້ວນ (+ ແຍກ Q-R)</option>
                            <option value="general_clean_balanced">ຖອດສຽງທົ່ວໄປ, ຕັດປະໂຫຍກບໍ່ຄົບຖ້ວນ, ຕັດໂຕງໂຕ້ຍບາງສ່ວນ (+ ແຍກ Q-R)</option>
                            <option value="nofiller">ຕັດຄຳໂຕງໂຕ້ຍອອກ (No fillers + ແຍກ Q-R)</option>
                            <option value="interview">ແບບສຳພາດ (ແຍກ Q-R ມາດຕະຖານ)</option>
                            <option value="summary_natural">ແບບສັງລວມໃຫ້ເຂົ້າໃຈ ແຕ່ຮັກສາຄວາມເປັນທຳມະຊາດ (+ ແຍກ Q-R)</option>
                            <option value="summary_interview">ແບບສຳພາດ + ສັງລວມທຳມະຊາດ (ແຍກ Q-R ແລະ ຕັດໂຕງໂຕ້ຍ)</option>
                            <option value="interview_natural_full">ແບບສຳພາດ + ຮັກສາແບບທຳມະຊາດ (ແຍກ Q-R, ຄົບຖ້ວນ)</option>
                        </select>
                    </div>

                    <!-- Timestamp Toggle -->
                    <div class="mb-5 flex items-center gap-2">
                        <input type="checkbox" id="timestamp-toggle" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer transition">
                        <label for="timestamp-toggle" class="text-sm font-medium text-gray-700 cursor-pointer">ເພີ່ມເວລາ (Timestamps) ໃສ່ໜ້າແຖວ (ເຊື່ອມຕໍ່ເວລາກັນອັດຕະໂນມັດ)</label>
                    </div>

                    <!-- Custom Instructions / Manual (NEW) -->
                    <div class="mb-5">
                        <label for="custom-instructions" class="block text-sm font-medium text-gray-700 mb-2">ຂໍ້ແນະນຳເພີ່ມເຕີມ / ຄູ່ມືການແກະສຽງ (ຖ້າມີ)</label>
                        <textarea id="custom-instructions" rows="3" class="w-full bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 outline-none transition resize-y" placeholder="ຕົວຢ່າງ: ຖ້າມີຄຳສັບສະເພາະໃຫ້ຂຽນແບບນີ້..., ໃຫ້ເນັ້ນໜັກເລື່ອງ..."></textarea>
                    </div>

                    <!-- File Upload -->
                    <div class="mb-5">
                        <label class="block text-sm font-medium text-gray-700 mb-2">ໄຟລ໌ສຽງ (ພຽງແຕ່ເລືອກເພື່ອເອົາຊື່ໄຟລ໌ໄປໃສ່ໃນຄຳສັ່ງ)</label>
                        <div id="dropzone" class="flex items-center justify-center w-full">
                            <label for="audio-upload" class="flex flex-col items-center justify-center w-full h-40 border-2 border-gray-300 border-dashed rounded-xl cursor-pointer bg-gray-50 hover:bg-gray-100 transition">
                                <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                                    <svg class="w-10 h-10 mb-3 text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 16">
                                        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2"/>
                                    </svg>
                                    <p class="mb-2 text-sm text-gray-600"><span class="font-semibold">ຄລິກເພື່ອເລືອກໄຟລ໌</span> ຫຼື ລາກໄຟລ໌ມາວາງ</p>
                                    <p class="text-xs text-gray-500">MP3, AAC, WAV, M4A</p>
                                </div>
                                <input id="audio-upload" type="file" class="hidden" accept="audio/*" onchange="handleFileSelect(event)" />
                            </label>
                        </div>
                        
                        <!-- File Info Display -->
                        <div id="file-info" class="hidden mt-3 p-3 bg-blue-50 border border-blue-100 rounded-lg flex items-center justify-between">
                            <div class="flex items-center gap-3 overflow-hidden">
                                <svg class="w-6 h-6 text-blue-600 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
                                <div class="truncate">
                                    <p id="file-name" class="text-sm font-medium text-gray-800 truncate"></p>
                                    <p id="file-size" class="text-xs text-gray-500"></p>
                                </div>
                            </div>
                            <button onclick="removeFile()" class="text-gray-400 hover:text-red-500 p-1">
                                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                            </button>
                        </div>

                        <!-- Split Audio Section -->
                        <div id="split-section" class="hidden mt-4 bg-indigo-50 border border-indigo-100 rounded-xl p-4">
                            <p class="text-sm text-indigo-800 mb-3 font-medium">✨ ຕ້ອງການແບ່ງໄຟລ໌ເພື່ອອັບໂຫຼດເທື່ອລະຕອນບໍ່?</p>
                            <div class="flex items-center gap-3 mb-3">
                                <label class="text-sm font-medium text-indigo-700 whitespace-nowrap">ເລືອກຂະໜາດ:</label>
                                <select id="chunk-size-select" class="w-full bg-white border border-indigo-200 text-indigo-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block p-2 outline-none">
                                    <option value="10">10 MB</option>
                                    <option value="12">12 MB</option>
                                    <option value="15" selected>15 MB (ແນະນຳ)</option>
                                    <option value="18">18 MB</option>
                                    <option value="20">20 MB</option>
                                </select>
                            </div>
                            <button onclick="splitAudioFile()" class="w-full flex items-center justify-center gap-2 text-indigo-900 bg-indigo-200 hover:bg-indigo-300 focus:ring-4 focus:ring-indigo-100 font-medium rounded-lg text-sm px-4 py-2 transition">
                                <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5"></path></svg>
                                ຕົກລົງແບ່ງໄຟລ໌
                            </button>
                        </div>

                        <!-- Parts List UI -->
                        <div id="parts-list" class="hidden mt-4 space-y-2 max-h-60 overflow-y-auto pr-1"></div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="space-y-3 pt-2 border-t border-gray-100 pt-5">
                        <button onclick="generatePrompt()" class="w-full flex items-center justify-center gap-2 text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-medium rounded-lg text-sm px-5 py-3 focus:outline-none transition">
                            <svg class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            ສ້າງຄຳສັ່ງສຳລັບກັອບປີ້
                        </button>
                    </div>

                </div>
            </div>

            <!-- Right Column: Output Workflow -->
            <div class="lg:col-span-7 flex flex-col gap-6 lg:h-[700px]">
                
                <!-- Box 1: Prompt Result -->
                <div class="bg-white rounded-2xl shadow-sm border border-blue-200 flex flex-col overflow-hidden">
                    <div class="border-b border-blue-100 p-4 bg-blue-50/50 flex justify-between items-center">
                        <h2 class="text-md font-semibold flex items-center gap-2 text-blue-800">
                            <span class="bg-blue-600 text-white w-6 h-6 flex items-center justify-center rounded-full text-sm">1</span>
                            ກັອບປີ້ຄຳສັ່ງ (Prompt) ໄປວາງໃນ Gemini
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="copyPrompt()" class="flex items-center gap-1.5 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded-md transition shadow-sm">
                                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                                Copy ຄຳສັ່ງ
                            </button>
                            <a href="https://gemini.google.com" target="_blank" class="flex items-center gap-1.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 hover:bg-gray-50 px-3 py-1.5 rounded-md transition shadow-sm">
                                ເປີດເວັບ Gemini 
                                <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                            </a>
                        </div>
                    </div>
                    <div class="p-4">
                        <textarea id="prompt-output" class="w-full h-40 p-3 text-gray-700 bg-gray-50 border border-gray-200 rounded-lg resize-none focus:ring-blue-500 focus:border-blue-500 outline-none" readonly placeholder="ເລືອກການຕັ້ງຄ່າ ແລະ ໄຟລ໌ດ້ານຊ້າຍມື ແລ້ວກົດປຸ່ມສ້າງຄຳສັ່ງ... ຄຳສັ່ງຈະສະແດງຢູ່ບ່ອນນີ້..."></textarea>
                    </div>
                </div>

                <!-- Box 2: Transcript Input for Export -->
                <div class="bg-white rounded-2xl shadow-sm border border-gray-200 flex flex-col flex-grow overflow-hidden">
                    <div class="border-b border-gray-100 p-4 bg-gray-50 flex justify-between items-center">
                        <h2 class="text-md font-semibold flex items-center gap-2 text-gray-800">
                            <span class="bg-gray-600 text-white w-6 h-6 flex items-center justify-center rounded-full text-sm">2</span>
                            ວາງຂໍ້ຄວາມທີ່ໄດ້ຈາກ Gemini
                        </h2>
                        
                        <button onclick="exportToWord()" class="flex items-center gap-1.5 text-sm font-medium text-white bg-green-600 hover:bg-green-700 px-3 py-1.5 rounded-md transition shadow-sm">
                            <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0l-4-4m4 4V4"/></svg>
                            Export .Doc
                        </button>
                    </div>

                    <div class="flex-grow relative">
                        <textarea id="transcript-output" class="w-full h-64 lg:h-full p-6 text-gray-700 bg-white border-none resize-none focus:ring-0 outline-none leading-relaxed" placeholder="ຫຼັງຈາກ Gemini ຖອດສຽງສຳເລັດແລ້ວ, ໃຫ້ກັອບປີ້ຂໍ້ຄວາມດັ່ງກ່າວມາວາງໃສ່ບ່ອນນີ້ ແລ້ວກົດປຸ່ມ Export ເປັນ Word..."></textarea>
                    </div>
                </div>

            </div>
        </div>
    </main>
    </div>

    <!-- Custom Toast Notification -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

    <script>
        // -- Login Logic --
        function checkPassword() {
            const password = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('login-error');
            const overlay = document.getElementById('login-overlay');
            const mainApp = document.getElementById('main-app');

            if (password === 'admin') {
                // Success
                errorMsg.classList.add('hidden');
                
                // Animate out overlay
                overlay.style.opacity = '0';
                
                setTimeout(() => {
                    overlay.classList.add('hidden');
                    // Show main app
                    mainApp.classList.remove('hidden');
                    mainApp.classList.add('flex');
                    // Small delay to allow display:flex to apply before animating opacity
                    setTimeout(() => {
                        mainApp.classList.remove('opacity-0', 'pointer-events-none');
                    }, 50);
                }, 300);
            } else {
                // Fail
                errorMsg.classList.remove('hidden');
                // Shake animation for error
                const loginBox = overlay.querySelector('div.bg-white');
                loginBox.classList.add('animate-shake');
                setTimeout(() => loginBox.classList.remove('animate-shake'), 500);
            }
        }

        function handleLoginKeyPress(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        }

        // Add shake animation style dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                20%, 40%, 60%, 80% { transform: translateX(5px); }
            }
            .animate-shake {
                animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            }
        `;
        document.head.appendChild(style);


        // App State
        let currentFile = null;
        let audioChunks = []; 
        let totalAudioDuration = 0; // ເກັບຄວາມຍາວສຽງທັງໝົດເປັນວິນາທີ
        
        // UI Elements
        const fileInput = document.getElementById('audio-upload');
        const fileInfo = document.getElementById('file-info');
        const dropzone = document.getElementById('dropzone');
        const promptOutput = document.getElementById('prompt-output');
        const transcriptOutput = document.getElementById('transcript-output');
        const splitSection = document.getElementById('split-section');
        const partsList = document.getElementById('parts-list');

        // -- Event Listeners for Drag and Drop --
        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('border-blue-500', 'bg-blue-50');
        });
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('border-blue-500', 'bg-blue-50');
        });
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('border-blue-500', 'bg-blue-50');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                processSelectedFile(e.dataTransfer.files[0]);
            }
        });

        // -- File Selection Logic --
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                processSelectedFile(file);
            }
        }

        function processSelectedFile(file) {
            if (!file.type.startsWith('audio/') && !file.type.startsWith('video/')) {
                showToast("ກະລຸນາເລືອກໄຟລ໌ສຽງ ຫຼື ວິດີໂອເທົ່ານັ້ນ.", "error");
                return;
            }

            currentFile = file;
            totalAudioDuration = 0;
            
            // ໂຫຼດຄວາມຍາວສຽງເພື່ອໃຊ້ຄຳນວນ Timestamp ຂອງແຕ່ລະຕອນ
            const audioUrl = URL.createObjectURL(file);
            const tmpAudio = new Audio(audioUrl);
            tmpAudio.onloadedmetadata = function() {
                totalAudioDuration = tmpAudio.duration; // ໄດ້ເປັນວິນາທີ
                URL.revokeObjectURL(audioUrl);
            };
            
            document.getElementById('file-name').textContent = file.name;
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            document.getElementById('file-size').textContent = `${sizeMB} MB`;
            
            fileInfo.classList.remove('hidden');
            splitSection.classList.remove('hidden');
            partsList.classList.add('hidden');
            audioChunks = [];
            
            showToast("ເລືອກໄຟລ໌ສຳເລັດ. ກະລຸນາກົດປຸ່ມສ້າງຄຳສັ່ງດ່ານລຸ່ມ.", "success");
        }

        function removeFile() {
            currentFile = null;
            audioChunks = [];
            totalAudioDuration = 0;
            fileInput.value = "";
            fileInfo.classList.add('hidden');
            splitSection.classList.add('hidden');
            partsList.classList.add('hidden');
            promptOutput.value = "";
        }

        // -- File Splitting & Download Logic --
        function splitAudioFile() {
            if (!currentFile) return;
            
            const selectedMB = parseInt(document.getElementById('chunk-size-select').value);
            const dynamicChunkSize = selectedMB * 1024 * 1024;

            audioChunks = [];
            let start = 0;
            let partNumber = 1;
            
            // ຄຳນວນຈຳນວນ Byte ສຳລັບ 10 ວິນາທີ (ເພື່ອໃຫ້ມີສ່ວນຊ້ອນທັບກັນ/Overlap ບໍ່ໃຫ້ຄຳເວົ້າຂາດຫາຍ)
            let overlapSeconds = 10;
            let overlapBytes = 0;
            if (totalAudioDuration > 0 && currentFile.size > 0) {
                let bytesPerSecond = currentFile.size / totalAudioDuration;
                overlapBytes = Math.floor(bytesPerSecond * overlapSeconds);
            } else {
                overlapBytes = 300 * 1024; // ປະມານ 300KB ຖ້າອ່ານເວລາບໍ່ໄດ້
            }
            
            // ປ້ອງກັນບໍ່ໃຫ້ Overlap ໃຫຍ່ເກີນໄປ (ສູງສຸດບໍ່ເກີນ 15% ຂອງໄຟລ໌)
            if (overlapBytes > dynamicChunkSize * 0.15) {
                overlapBytes = Math.floor(dynamicChunkSize * 0.15);
            }
            
            while (start < currentFile.size) {
                let end = Math.min(start + dynamicChunkSize, currentFile.size);
                let blob = currentFile.slice(start, end, currentFile.type || 'audio/mp3');
                
                // ຄຳນວນວ່າຕອນນີ້ເລີ່ມຕົ້ນທີ່ວິນາທີທີເທົ່າໃດຂອງໄຟລ໌ເຕັມ
                let startTimeSeconds = 0;
                if (totalAudioDuration > 0 && currentFile.size > 0) {
                    startTimeSeconds = (start / currentFile.size) * totalAudioDuration;
                }

                audioChunks.push({
                    id: partNumber,
                    blob: blob,
                    sizeMB: (blob.size / (1024 * 1024)).toFixed(2),
                    startTimeSeconds: startTimeSeconds
                });
                
                if (end >= currentFile.size) break; // ຈົບໄຟລ໌
                
                // ຍ້າຍຈຸດເລີ່ມຕົ້ນຂອງຄິບຕໍ່ໄປຖອຍຫຼັງ ເພື່ອໃຫ້ມີການຊ້ອນທັບ (Overlap) 10 ວິນາທີ
                start = end - overlapBytes;
                partNumber++;
            }
            
            renderChunksUI();
            splitSection.classList.add('hidden');
            showToast(`ແບ່ງໄຟລ໌ສຳເລັດ! ໄດ້ທັງໝົດ ${audioChunks.length} ຕອນ (ເຊື່ອມຕໍ່ສຽງ 10 ວິນາທີ).`, "success");
        }

        function renderChunksUI() {
            partsList.classList.remove('hidden');
            partsList.innerHTML = '';
            audioChunks.forEach((chunk, index) => {
                partsList.innerHTML += `
                    <div class="p-3 border border-gray-200 rounded-lg bg-white flex flex-col gap-2 shadow-sm">
                        <div class="flex justify-between items-center">
                            <span class="font-medium text-sm text-gray-800">ຕອນທີ ${chunk.id} <span class="text-xs text-gray-500">(${chunk.sizeMB} MB)</span></span>
                            <button onclick="downloadChunk(${index})" class="flex items-center gap-1 text-xs font-medium bg-gray-100 hover:bg-gray-200 text-gray-700 px-2 py-1.5 rounded transition">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0l-4-4m4 4V4"></path></svg>
                                ໂຫຼດໄຟລ໌
                            </button>
                        </div>
                        <button onclick="generateChunkPrompt(${index})" class="w-full text-xs bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-700 py-1.5 rounded font-medium transition">
                            ສ້າງຄຳສັ່ງສຳລັບຕອນທີ ${chunk.id}
                        </button>
                    </div>
                `;
            });
        }

        function downloadChunk(index) {
            const chunk = audioChunks[index];
            const url = URL.createObjectURL(chunk.blob);
            const a = document.createElement('a');
            a.href = url;
            
            // Generate filename logic
            let ext = 'mp3';
            let baseName = 'audio';
            if (currentFile && currentFile.name) {
                const parts = currentFile.name.split('.');
                if (parts.length > 1) {
                    ext = parts.pop();
                    baseName = parts.join('.');
                } else {
                    baseName = currentFile.name;
                }
            }
            
            a.download = `${baseName}_part${chunk.id}.${ext}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast(`ດາວໂຫຼດຕອນທີ ${chunk.id} ແລ້ວ`, "success");
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "00:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) {
                return `[${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}]`;
            }
            return `[${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}]`;
        }

        function generateChunkPrompt(index) {
            const chunk = audioChunks[index];
            generatePrompt(chunk.id, audioChunks.length, chunk.startTimeSeconds);
        }

        // -- Prompt Generation Logic --
        function generatePrompt(chunkId = null, totalChunks = null, startTimeSeconds = 0) {
            const language = document.getElementById('language-select').value;
            const mode = document.getElementById('mode-select').value;
            const includeTimestamp = document.getElementById('timestamp-toggle').checked;
            const customInstructions = document.getElementById('custom-instructions').value.trim();
            
            let filename = currentFile ? currentFile.name : "ໄຟລ໌ທີ່ແນບມານີ້";
            let finalPrompt = "";
            let startTimeStr = formatTime(startTimeSeconds);
            
            let prefixContext = "";
            if (chunkId && totalChunks) {
                if (language === 'lao') {
                    prefixContext = `[ສຳຄັນ: ນີ້ແມ່ນໄຟລ໌ສຽງ ຕອນທີ ${chunkId} ຈາກທັງໝົດ ${totalChunks} ຕອນ ຂອງໄຟລ໌ "${filename}"]\n`;
                    if (chunkId > 1) {
                        prefixContext += `[ໝາຍເຫດ: 10 ວິນາທີທຳອິດຂອງຄິບນີ້ເປັນສ່ວນທີ່ຊ້ອນທັບ (Overlap) ກັບທ້າຍຄິບທີ່ແລ້ວ ເພື່ອບໍ່ໃຫ້ຄຳເວົ້າຂາດຫາຍ. ໃຫ້ທ່ານຖອດສຽງຕໍ່ເນື່ອງຈາກເນື້ອໃນເດີມເລີຍ]\n\n`;
                    } else {
                        prefixContext += `\n`;
                    }
                } else {
                    prefixContext = `[Important: This is audio Part ${chunkId} of ${totalChunks} from the file "${filename}"]\n`;
                    if (chunkId > 1) {
                        prefixContext += `[Note: The first 10 seconds of this clip overlap with the end of the previous clip to prevent cut-off words. Please continue transcribing seamlessly.]\n\n`;
                    } else {
                        prefixContext += `\n`;
                    }
                }
            }

            // --- ປັບປຸງໃໝ່: ບັງຄັບໃຫ້ແຍກ Q ແລະ R ສະເໝີ ໃນທຸກໆຮູບແບບ ---
            let baseRulesLao = `ຄຳສັ່ງສຳຄັນທີ່ສຸດ (ຂໍ້ບັງຄັບ):\n1. ໃຫ້ຟັງ ແລະ ແກະສຽງຢ່າງລະອຽດທີ່ສຸດ ຫ້າມຂ້າມຊ່ວງໃດຊ່ວງໜຶ່ງຂອງຄິບສຽງເດັດຂາດ.\n2. ຕ້ອງແຍກຜູ້ເວົ້າຢ່າງຊັດເຈນ ໂດຍຂຶ້ນແຖວໃໝ່ທຸກຄັ້ງທີ່ປ່ຽນຄົນເວົ້າ.\n3. ຂຶ້ນໜ້າແຖວໃໝ່ ຕ້ອງໃສ່ຄຳວ່າ "Q:" ສຳລັບຜູ້ຖາມ ແລະ "R:" ສຳລັບຜູ້ຕອບ ສະເໝີ ຫ້າມເອົາຄຳເວົ້າມາລວມກັນໃນຫຍໍ້ໜ້າດຽວເດັດຂາດ.`;
            
            let baseRulesEng = `Strict Instructions:\n1. Listen and transcribe as meticulously as possible. You absolutely MUST NOT skip any part of the audio.\n2. Clearly identify speakers by starting a new line EVERY TIME the speaker changes.\n3. Prefix the questioner's line with "Q: " and the responder's line with "R: ". Do not combine different speakers into the same paragraph.`;

            if (language === 'lao') {
                if (mode === 'general' || mode === 'interview' || mode === 'interview_natural_full') {
                    finalPrompt = `${prefixContext}ກະລຸນາຖອດສຽງຈາກໄຟລ໌ສຽງທີ່ແນບມານີ້ ຊື່ໄຟລ໌ "${filename}" ເປັນພາສາລາວ.\n\n${baseRulesLao}\n4. ໃຫ້ຖອດທຸກຄຳເວົ້າຕັ້ງແຕ່ຕົ້ນຈົນຈົບຄິບສຽງແບບຄົບຖ້ວນທຸກປະການ (Word-for-word). ຫ້າມຕັດຫຍໍ້ ແລະ ຫ້າມສະຫຼຸບຄວາມເດັດຂາດ.`;
                } else if (mode === 'idi_intelligent_verbatim') {
                    finalPrompt = `${prefixContext}ກະລຸນາຖອດສຽງຈາກໄຟລ໌ສຽງທີ່ແນບມານີ້ ຊື່ໄຟລ໌ "${filename}" ເປັນພາສາລາວ.\n\n${baseRulesLao}\n4. **ອົງປະກອບທີ່ຕ້ອງຕັດອອກ:** ການເວົ້າກຶກໆກັກໆ, ຄຳເວົ້າທີ່ບໍ່ສົມບູນ, ປະໂຫຍກສັ້ນໆທີ່ບໍ່ຄົບຖ້ວນ, ຄຳເວົ້າເສີມ/ຄຳໂຕງໂຕ້ຍ (ເຊັ່ນ: "ເອີ", "ອາ", "ສະນັ້ນ", "ແບບວ່າ"), ສຽງທີ່ບໍ່ແມ່ນການເວົ້າ, ການເລີ່ມຕົ້ນປະໂຫຍກທີ່ຜິດພາດ (False starts), ແລະ ຄຳສັບທີ່ເວົ້າຊ້ຳໆເປັນນິດໄສທີ່ບໍ່ມີປະໂຫຍດ.\n5. **ສິ່ງທີ່ຕ້ອງຮັກສາໄວ້:** ສຽງຫົວ ແລະ ປະຄຳອຸທານທີ່ຊ່ວຍສ້າງບໍລິບົດ (ເຊັ່ນ: "ເອີ... ເຮີ້ຍ").\n6. ຫ້າມສະຫຼຸບຄວາມເດັດຂາດ.`;
                } else if (mode === 'general_clean_original') {
                    finalPrompt = `${prefixContext}ກະລຸນາຖອດສຽງຈາກໄຟລ໌ສຽງທີ່ແນບມານີ້ ຊື່ໄຟລ໌ "${filename}" ເປັນພາສາລາວ.\n\n${baseRulesLao}\n4. ໃຫ້ຖອດຂໍ້ຄວາມຕັ້ງແຕ່ຕົ້ນຈົນຈົບ ແຕ່ໃຫ້ "ຕັດສະເພາະປະໂຫຍກ ຫຼື ວະລີທີ່ເວົ້າບໍ່ຈົບ, ບໍ່ຄົບຖ້ວນ, ຫຼື ຟັງແລ້ວບໍ່ສາມາດເຂົ້າໃຈຄວາມໝາຍໄດ້" ອອກໄປ. ສຳລັບປະໂຫຍກອື່ນໆທີ່ສົມບູນ ໃຫ້ຮັກສາໄວ້ຄືເກົ່າທຸກປະການ (Word-for-word). ຫ້າມສະຫຼຸບຄວາມເດັດຂາດ.`;
                } else if (mode === 'general_clean_balanced') {
                    finalPrompt = `${prefixContext}ກະລຸນາຖອດສຽງຈາກໄຟລ໌ສຽງທີ່ແນບມານີ້ ຊື່ໄຟລ໌ "${filename}" ເປັນພາສາລາວ.\n\n${baseRulesLao}\n4. ໃຫ້ຖອດຂໍ້ຄວາມຕັ້ງແຕ່ຕົ້ນຈົນຈົບ ແຕ່ໃຫ້ "ຕັດສະເພາະປະໂຫຍກ ຫຼື ວະລີທີ່ເວົ້າບໍ່ຈົບ, ບໍ່ຄົບຖ້ວນ, ຫຼື ຟັງແລ້ວບໍ່ສາມາດເຂົ້າໃຈຄວາມໝາຍໄດ້" ອອກໄປ **ແຕ່ລະວັງຢ່າຕັດອອກຫຼາຍເກີນໄປຈົນເສຍເນື້ອໃນ**.\n5. ອະນຸຍາດໃຫ້ຕັດຄຳໂຕງໂຕ້ຍ, ຄຳຊ້ຳ, ຫຼື ຄຳລັງເລ (ເຊັ່ນ: ເອີ, ອ່າ, ແບບວ່າ) ອອກໄດ້ບາງສ່ວນເພື່ອຄວາມສະອາດ ແຕ່ **ບໍ່ໃຫ້ຕັດອອກທັງໝົດ** ເພື່ອຮັກສາຄວາມເປັນທຳມະຊາດໄວ້. ສຳລັບປະໂຫຍກອື່ນໆທີ່ສົມບູນ ໃຫ້ຮັກສາໄວ້ຄືເກົ່າທຸກປະການ (Word-for-word). ຫ້າມສະຫຼຸບຄວາມ.`;
                } else if (mode === 'nofiller') {
                    finalPrompt = `${prefixContext}ກະລຸນາຖອດສຽງຈາກໄຟລ໌ສຽງທີ່ແນບມານີ້ ຊື່ໄຟລ໌ "${filename}" ເປັນພາສາລາວ.\n\n${baseRulesLao}\n4. ໃຫ້ຖອດຂໍ້ຄວາມຕັ້ງແຕ່ຕົ້ນຈົນຈົບ ແຕ່ໃຫ້ຕັດຄຳໂຕງໂຕ້ຍ, ຄຳຊ້ຳ, ຫຼື ຄຳລັງເລອອກທັງໝົດ (ເຊັ່ນ: ເອີ, ອ່າ, ແບບວ່າ, ກະຄືວ່າ, ອັນນັ້ນ) ເພື່ອໃຫ້ອ່ານງ່າຍຂຶ້ນ ໂດຍຮັກສາເນື້ອໃນສຳຄັນໄວ້ໃຫ້ຄົບຖ້ວນທຸກປະການ. ຫ້າມສະຫຼຸບຄວາມ.`;
                } else if (mode === 'summary_natural' || mode === 'summary_interview') {
                    finalPrompt = `${prefixContext}ກະລຸນາຖອດສຽງຈາກໄຟລ໌ສຽງທີ່ແນບມານີ້ ຊື່ໄຟລ໌ "${filename}" ເປັນພາສາລາວ.\n\n${baseRulesLao}\n4. ໃຫ້ຖອດສຽງແລ້ວສັງລວມເນື້ອໃນໃຫ້ເຂົ້າໃຈງ່າຍຂຶ້ນ ແຕ່ **ຫ້າມຄັດຫຍໍ້ຈົນສັ້ນເກີນໄປ**. ໃຫ້ຮັກສາຄວາມໝາຍເດີມ ແລະ ຄວາມເປັນທຳມະຊາດຂອງການສົນທະນາໄວ້ໃຫ້ຄົບຖ້ວນ.\n5. ຕັດຄຳໂຕງໂຕ້ຍ, ຄຳຊ້ຳ, ຫຼື ຄຳລັງເລອອກທັງໝົດ.`;
                }
            } else { // English
                if (mode === 'general' || mode === 'interview' || mode === 'interview_natural_full') {
                    finalPrompt = `${prefixContext}Please accurately transcribe the attached audio file named "${filename}" into English.\n\n${baseRulesEng}\n4. Transcribe completely and verbatim (Word-for-word). DO NOT summarize, DO NOT skip any parts, and DO NOT shorten the text.`;
                } else if (mode === 'idi_intelligent_verbatim') {
                    finalPrompt = `${prefixContext}Please accurately transcribe the attached audio file named "${filename}" into English.\n\n${baseRulesEng}\n4. **Elements to REMOVE:** Stutters, incomplete words, short incomplete sentences, filler words (e.g., "uh", "um", "so", "like"), non-speech sounds (e.g., coughs, throat clearing), false starts, and habitually repeated words that do not add value to the content.\n5. **Elements to KEEP:** Laughter (as it shows the overall emotion and banter) and meaningful interjections (e.g., "uh-huh", "oh", "hey") that help build context.\n6. DO NOT summarize the text.`;
                } else if (mode === 'general_clean_original') {
                    finalPrompt = `${prefixContext}Please accurately transcribe the attached audio file named "${filename}" into English.\n\n${baseRulesEng}\n4. Transcribe from start to finish, but specifically REMOVE any incomplete sentences, cut-off phrases, or segments that are completely incomprehensible. Keep all other complete and meaningful content exactly as spoken (Word-for-word). DO NOT summarize.`;
                } else if (mode === 'general_clean_balanced') {
                    finalPrompt = `${prefixContext}Please accurately transcribe the attached audio file named "${filename}" into English.\n\n${baseRulesEng}\n4. Transcribe from start to finish, but specifically REMOVE any incomplete sentences, cut-off phrases, or segments that are completely incomprehensible, **but be very careful not to remove too much content**.\n5. You may remove SOME filler words (e.g., um, ah, er) to clean up the text, but **DO NOT remove all of them** in order to maintain a natural flow. Keep all other complete and meaningful content exactly as spoken (Word-for-word). DO NOT summarize.`;
                } else if (mode === 'nofiller') {
                    finalPrompt = `${prefixContext}Please transcribe the attached audio file named "${filename}" into English.\n\n${baseRulesEng}\n4. Provide a full transcription from start to finish, but please REMOVE filler words, stutters, and hesitation marks (e.g., um, ah, er, like, you know). Keep the core message and flow completely intact. DO NOT summarize.`;
                } else if (mode === 'summary_natural' || mode === 'summary_interview') {
                    finalPrompt = `${prefixContext}Please transcribe the attached audio file named "${filename}" into English.\n\n${baseRulesEng}\n4. Thoughtfully summarize the content for clarity, but **DO NOT over-abbreviate**. Maintain the original meaning and natural conversational flow.\n5. Remove all filler words, stutters, and hesitation marks.`;
                }
            }

            if (includeTimestamp) {
                if (language === 'lao') {
                    finalPrompt += `\n\n[ຄຳສັ່ງເພີ່ມເຕີມ]: ກະລຸນາໃສ່ເວລາ (Timestamp) ໄວ້ທາງໜ້າຂອງທຸກໆແຖວ, ທຸກໆຫຍໍ້ໜ້າ, ຫຼື ທຸກໆຄັ້ງທີ່ມີການປ່ຽນຄົນເວົ້າ.`;
                    if (chunkId && chunkId > 1 && startTimeSeconds > 0) {
                        finalPrompt += `\n**ສຳຄັນຫຼາຍ**: ເນື່ອງຈາກນີ້ແມ່ນຄິບສຽງສ່ວນຕໍ່ເນື່ອງ ໃຫ້ກຳນົດວ່າ "ວິນາທີທີ 0" ຂອງຄິບສຽງທີ່ອັບໂຫຼດນີ້ ຄືເວລາ ${startTimeStr} ຂອງຄິບເຕັມ. ດັ່ງນັ້ນ ໃຫ້ເລີ່ມຕົ້ນຂຽນເວລາ (Timestamp) ຈາກ ${startTimeStr} ເປັນຕົ້ນໄປ (ຫ້າມເລີ່ມຈາກ 00:00 ເດັດຂາດ).`;
                    } else {
                        finalPrompt += ` (ເຊັ່ນ: [00:00])`;
                    }
                } else {
                    finalPrompt += `\n\n[Additional Instruction]: Please include a timestamp at the beginning of every line, paragraph, or every time the speaker changes.`;
                    if (chunkId && chunkId > 1 && startTimeSeconds > 0) {
                        finalPrompt += `\n**CRITICAL**: Since this is a continuation audio part, you MUST treat the 0-second mark of this specific audio file as ${startTimeStr} in the full interview context. Start all timestamps from ${startTimeStr} onwards (DO NOT start from 00:00).`;
                    } else {
                        finalPrompt += ` (e.g., [00:00])`;
                    }
                }
            }

            if (customInstructions) {
                if (language === 'lao') {
                    finalPrompt += `\n\n[ຄູ່ມື / ຂໍ້ແນະນຳເພີ່ມເຕີມສຳລັບການແກະສຽງ]:\n${customInstructions}`;
                } else {
                    finalPrompt += `\n\n[Additional Transcription Guidelines / Manual]:\n${customInstructions}`;
                }
            }

            promptOutput.value = finalPrompt;
            if(chunkId) {
                showToast(`ສ້າງຄຳສັ່ງສຳລັບຕອນທີ ${chunkId} ສຳເລັດ!`, "success");
            } else {
                showToast("ສ້າງຄຳສັ່ງສຳເລັດ! ກະລຸນາກັອບປີ້ແລ້ວນຳໄປວາງໃນ Gemini.", "success");
            }
        }

        // -- Copy to Clipboard --
        function copyPrompt() {
            if (!promptOutput.value) {
                showToast("ຍັງບໍ່ມີຄຳສັ່ງໃຫ້ກັອບປີ້!", "warning");
                return;
            }
            
            promptOutput.select();
            promptOutput.setSelectionRange(0, 99999); /* For mobile devices */

            try {
                // Using document.execCommand as fallback for iframe environments
                document.execCommand('copy');
                showToast("ກັອບປີ້ຄຳສັ່ງສຳເລັດແລ້ວ!", "success");
                
                // Deselect text
                window.getSelection().removeAllRanges();
            } catch (err) {
                showToast("ບໍ່ສາມາດກັອບປີ້ໄດ້, ກະລຸນາກັອບປີ້ດ້ວຍຕົວເອງ", "error");
            }
        }

        // -- Export to Word --
        function exportToWord() {
            const text = transcriptOutput.value.trim();
            if (!text) {
                showToast("ບໍ່ມີຂໍ້ຄວາມໃຫ້ບັນທຶກ (No text to export)", "warning");
                return;
            }

            // Create a basic HTML structure that Word can read
            const htmlContent = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>Audio Transcript</title>
                    <style>
                        body { font-family: 'Noto Sans Lao', Arial, sans-serif; font-size: 12pt; line-height: 1.5; }
                        p { margin-bottom: 10pt; }
                    </style>
                </head>
                <body>
                    <h2>Audio Transcript</h2>
                    <div>${text.replace(/\n/g, '<br>')}</div>
                </body>
                </html>
            `;

            // Create Blob with BOM for UTF-8 compatibility in MS Word
            const blob = new Blob(['\ufeff', htmlContent], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            
            // Generate filename based on original audio file
            let downloadName = 'Transcript.doc';
            if (currentFile) {
                downloadName = currentFile.name.split('.')[0] + '_Transcript.doc';
            }

            const link = document.createElement('a');
            link.href = url;
            link.download = downloadName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
            
            showToast("ບັນທຶກເປັນໄຟລ໌ Word ສຳເລັດ!", "success");
        }

        // -- Utility Functions --
        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgColor, icon;
            switch(type) {
                case 'success':
                    bgColor = 'bg-green-500';
                    icon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
                    break;
                case 'error':
                    bgColor = 'bg-red-500';
                    icon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                    break;
                case 'warning':
                    bgColor = 'bg-yellow-500';
                    icon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;
                    break;
                default:
                    bgColor = 'bg-blue-500';
                    icon = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            }

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-lg text-white shadow-lg transform transition-all duration-300 translate-x-full ${bgColor}`;
            toast.innerHTML = `
                ${icon}
                <span class="text-sm font-medium">${message}</span>
            `;

            toastContainer.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-full');
            });

            // Remove after 4 seconds
            setTimeout(() => {
                toast.classList.add('translate-x-full');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

    </script>
</body>
